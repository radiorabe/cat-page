name: Semantic Release

on:
  push:
    branches:
      - main
      - release/*

permissions: {}

jobs:
  semantic-release:
    permissions:
      contents: read
    uses: radiorabe/actions/.github/workflows/semantic-release.yaml@v0.40.0
    secrets:
      RABE_ITREAKTION_GITHUB_TOKEN: ${{ secrets.RABE_ITREAKTION_GITHUB_TOKEN }}
