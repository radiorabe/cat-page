name: Release

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

permissions: {}

jobs:
  release-container:
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    uses: radiorabe/actions/.github/workflows/release-container.yaml@5dafb461cea1f8b296d89297dc6de7bd0891f0d2 # v0.44.2
    with:
      image: 'ghcr.io/radiorabe/catpage'
      name: 'catpage'
      display-name: 'Cat Page'
      tags: 'minimal rhel9 rabe s2i python python311 catpage'
  release-docs:
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: radiorabe/actions/.github/workflows/release-zensical.yaml@5dafb461cea1f8b296d89297dc6de7bd0891f0d2 # v0.44.2
    with:
      requirements: mkdocstrings[autorefs]
  helm-chart:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-container
    permissions:
      contents: read
      packages: write # for pushing to GitHub Container Registry
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Prepare Chart Metadata
        id: chartmeta
        run: echo version=${GITHUB_REF#refs/tags/v} >> $GITHUB_OUTPUT

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.20.1

      - name: Package Chart
        env:
          STEPS_CHARTMETA_VERSION: ${{ steps.chartmeta.outputs.version }}
        run: helm package --version ${STEPS_CHARTMETA_VERSION} --app-version ${STEPS_CHARTMETA_VERSION} --destination=dist charts/catpage

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Chart
        run: helm push dist/*.tgz oci://ghcr.io/radiorabe/helm
