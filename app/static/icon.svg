<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#7ff0eb" rx="64"/>
  <!-- Cat head -->
  <ellipse cx="256" cy="300" rx="148" ry="130" fill="#231f20"/>
  <!-- Left ear -->
  <polygon points="136,208 104,100 212,182" fill="#231f20"/>
  <!-- Right ear -->
  <polygon points="376,208 408,100 300,182" fill="#231f20"/>
  <!-- Left ear inner pink -->
  <polygon points="140,200 118,122 200,178" fill="#ff9eb5"/>
  <!-- Right ear inner pink -->
  <polygon points="372,200 394,122 312,178" fill="#ff9eb5"/>
  <!-- Eyes: big green cat eyes -->
  <ellipse cx="204" cy="280" rx="34" ry="38" fill="#7fff00"/>
  <ellipse cx="308" cy="280" rx="34" ry="38" fill="#7fff00"/>
  <!-- Pupils (vertical slits) -->
  <ellipse cx="204" cy="282" rx="14" ry="32" fill="#231f20"/>
  <ellipse cx="308" cy="282" rx="14" ry="32" fill="#231f20"/>
  <!-- Eye shine -->
  <ellipse cx="212" cy="270" rx="6" ry="8" fill="white" opacity="0.8"/>
  <ellipse cx="316" cy="270" rx="6" ry="8" fill="white" opacity="0.8"/>
  <!-- Nose -->
  <polygon points="256,320 242,336 270,336" fill="#ff9eb5"/>
  <!-- Mouth -->
  <path d="M242,336 Q228,354 214,348" fill="none" stroke="#7ff0eb" stroke-width="5" stroke-linecap="round"/>
  <path d="M270,336 Q284,354 298,348" fill="none" stroke="#7ff0eb" stroke-width="5" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="100" y1="316" x2="220" y2="326" stroke="#7ff0eb" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="100" y1="334" x2="218" y2="336" stroke="#7ff0eb" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="100" y1="352" x2="220" y2="346" stroke="#7ff0eb" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Whiskers right -->
  <line x1="292" y1="326" x2="412" y2="316" stroke="#7ff0eb" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="294" y1="336" x2="412" y2="334" stroke="#7ff0eb" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="292" y1="346" x2="412" y2="352" stroke="#7ff0eb" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Headphones band -->
  <path d="M140,240 Q256,130 372,240" fill="none" stroke="#231f20" stroke-width="18" stroke-linecap="round"/>
  <!-- Headphone cups -->
  <rect x="110" y="230" width="46" height="60" rx="16" fill="#231f20"/>
  <rect x="356" y="230" width="46" height="60" rx="16" fill="#231f20"/>
  <!-- Headphone cup highlight -->
  <rect x="118" y="238" width="16" height="22" rx="6" fill="#7ff0eb" opacity="0.5"/>
  <rect x="364" y="238" width="16" height="22" rx="6" fill="#7ff0eb" opacity="0.5"/>
</svg>
