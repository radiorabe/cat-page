<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#7ff0eb" rx="64"/>
  <!--
    Corvus corvus (common raven) — the RaBe mascot.
    Perched bird, facing right, in brand dark #231f20 on teal #7ff0eb.
    Body proportions inspired by the rabe-artwork logo bird.
  -->
  <!-- Tail fan -->
  <path d="M148,390 C130,430 110,448 88,448 C110,460 136,456 155,440 C170,456 188,466 195,460 C190,444 176,424 168,400 Z" fill="#231f20"/>
  <!-- Main body -->
  <path d="M155,240 C130,260 112,298 118,340 C122,368 140,390 168,400 C196,410 240,408 270,390 C296,374 310,348 306,316 C300,278 272,252 240,242 C218,234 178,228 155,240 Z" fill="#231f20"/>
  <!-- Wing detail -->
  <path d="M162,268 C148,290 142,320 148,352 C154,380 168,398 168,400 C196,410 240,408 270,390 C296,374 310,348 306,316 C300,278 272,252 240,242 C218,234 178,228 162,268 Z" fill="#1a1617"/>
  <!-- Wing highlight (subtle feather sheen) -->
  <path d="M185,270 C172,290 168,318 174,344 C176,352 180,360 186,366 C200,354 218,344 232,336 C248,328 262,316 268,300 C256,266 228,248 210,248 C200,248 190,256 185,270 Z" fill="#2d2829"/>
  <!-- Neck -->
  <path d="M240,242 C218,234 200,220 196,200 C194,188 200,176 212,170 C224,164 238,168 248,178 C258,188 264,202 260,216 C258,228 250,238 240,242 Z" fill="#231f20"/>
  <!-- Head -->
  <ellipse cx="222" cy="158" rx="52" ry="46" fill="#231f20"/>
  <!-- Beak — hooked corvid shape, pointing right -->
  <path d="M264,146 C284,142 308,138 318,144 C312,154 296,160 278,158 C292,168 306,176 308,184 C298,186 282,180 268,170 C262,164 260,154 264,146 Z" fill="#231f20"/>
  <!-- Beak lower mandible -->
  <path d="M268,158 C282,162 298,168 308,178 C300,182 284,178 270,170 Z" fill="#3a3536"/>
  <!-- Eye -->
  <circle cx="232" cy="148" r="10" fill="white"/>
  <circle cx="234" cy="148" r="7" fill="#231f20"/>
  <circle cx="236" cy="146" r="2.5" fill="white" opacity="0.9"/>
  <!-- Legs -->
  <line x1="200" y1="398" x2="192" y2="440" stroke="#231f20" stroke-width="9" stroke-linecap="round"/>
  <line x1="230" y1="402" x2="226" y2="444" stroke="#231f20" stroke-width="9" stroke-linecap="round"/>
  <!-- Toes left foot -->
  <line x1="192" y1="440" x2="166" y2="446" stroke="#231f20" stroke-width="6" stroke-linecap="round"/>
  <line x1="192" y1="440" x2="185" y2="452" stroke="#231f20" stroke-width="6" stroke-linecap="round"/>
  <line x1="192" y1="440" x2="204" y2="450" stroke="#231f20" stroke-width="6" stroke-linecap="round"/>
  <line x1="192" y1="440" x2="216" y2="444" stroke="#231f20" stroke-width="6" stroke-linecap="round"/>
  <!-- Toes right foot -->
  <line x1="226" y1="444" x2="200" y2="450" stroke="#231f20" stroke-width="6" stroke-linecap="round"/>
  <line x1="226" y1="444" x2="218" y2="456" stroke="#231f20" stroke-width="6" stroke-linecap="round"/>
  <line x1="226" y1="444" x2="236" y2="454" stroke="#231f20" stroke-width="6" stroke-linecap="round"/>
  <line x1="226" y1="444" x2="248" y2="448" stroke="#231f20" stroke-width="6" stroke-linecap="round"/>
</svg>
